name: chat_app
description: Telegram-like chat application
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ─── Firebase Core ────────────────────────────────────
  firebase_core: ^3.8.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0

  # ─── Notifications ────────────────────────────────────
  flutter_local_notifications: ^18.0.1

  # ─── Media & Files ────────────────────────────────────
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  cached_network_image: ^3.4.1
  video_player: ^2.9.2
  photo_view: ^0.15.0

  # ─── Audio (Voice Messages) ───────────────────────────
  record: ^5.2.0
  audioplayers: ^6.4.0

  # ─── UI Components ────────────────────────────────────
  emoji_picker_flutter: ^2.4.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.3.1

  # ─── State Management ─────────────────────────────────
  provider: ^6.1.2

  # ─── Navigation ───────────────────────────────────────
  go_router: ^14.6.1

  # ─── Utilities ────────────────────────────────────────
  intl: ^0.20.1
  uuid: ^4.5.1
  timeago: ^3.7.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.1.1
  url_launcher: ^6.3.1
  open_filex: ^4.6.0
  path: ^1.9.0
  mime: ^2.0.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/images/
